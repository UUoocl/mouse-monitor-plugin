<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Monitor Overlay</title>
    <style>
        :root {
            --bg-color: rgba(15, 15, 20, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --accent-color: #00d2ff;
            --glow-color: rgba(0, 210, 255, 0.5);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            overflow: hidden;
            background: transparent;
            font-family: var(--font-family);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            pointer-events: none;
        }

        #history {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: fit-content;
        }

        .combo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s cubic-bezier(0.17, 0.67, 0.83, 1) forwards;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .key {
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .separator {
            color: var(--accent-color);
            opacity: 0.8;
        }

        .mouse-action {
            color: var(--accent-color);
            font-style: italic;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-50px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        /* Mouse Position Indicator */
        #cursor-glow {
            position: fixed;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            filter: blur(4px);
            box-shadow: 0 0 15px var(--glow-color);
        }

        #scroll-speed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.9rem;
            color: var(--accent-color);
            background: var(--bg-color);
            padding: 5px 10px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #monitor-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-color);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.75rem;
            min-width: 200px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
        }

        #monitor-panel h3 {
            margin: 0 0 10px 0;
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .monitor-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .monitor-label {
            color: var(--text-color);
            opacity: 0.6;
        }

        .monitor-value {
            color: var(--text-color);
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
            text-align: right;
        }
    </style>
</head>

<body>
    <div id="monitor-panel">
        <h3>Mouse Monitor</h3>
        <div class="monitor-row">
            <span class="monitor-label">Position:</span>
            <span id="mon-position" class="monitor-value">None</span>
        </div>
        <div class="monitor-row">
            <span class="monitor-label">Click:</span>
            <span id="mon-click" class="monitor-value">None</span>
        </div>
        <div class="monitor-row">
            <span class="monitor-label">Scroll:</span>
            <span id="mon-scroll" class="monitor-value">None</span>
        </div>
    </div>
    <div id="cursor-glow"></div>
    <div id="scroll-speed">Scroll: 0.0</div>
    <div id="history"></div>

    <script>
        const historyContainer = document.getElementById('history');
        const cursorGlow = document.getElementById('cursor-glow');
        const scrollLabel = document.getElementById('scroll-speed');

        const params = new URLSearchParams(window.location.search);
        const showMonitor = params.get('monitor') !== '0';
        const targetTopic = params.get('topic') || '';

        if (showMonitor) {
            document.getElementById('monitor-panel').style.display = 'block';
        }

        let clearScrollTimer;

        // State tracking
        let mouseX = 0;
        let mouseY = 0;

        // WebSocket Connection to Dynamic Route
        async function connectBridge() {
            try {
                const port = window.location.port || '4466';
                let wsUrl = `ws://127.0.0.1:${port}/ws/`;
                
                // Use the full topic from query parameter (e.g. topic=mouse/click)
                // Default to 'mouse' if no topic is provided
                if (targetTopic) {
                    wsUrl += targetTopic;
                } else {
                    wsUrl += "mouse";
                }

                console.log(`Connecting to ${wsUrl}...`);
                const socket = new WebSocket(wsUrl);

                socket.onopen = () => {
                    console.log('Mouse monitor connection established');
                };

                socket.onmessage = (msg) => {
                    try {
                        const data = JSON.parse(msg.data);
                        processSignal(data);
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };

                socket.onclose = () => {
                    console.warn('Connection lost. Retrying in 2s...');
                    setTimeout(connectBridge, 2000);
                };

                socket.onerror = (err) => {
                    console.error('Socket error:', err);
                };

            } catch (e) {
                console.warn('Connection failed, retrying in 2s...', e);
                setTimeout(connectBridge, 2000);
            }
        }

        // Start connection
        connectBridge();

        function updateMonitorUI(type, value) {
            if (!showMonitor) return;
            const el = document.getElementById(`mon-${type}`);
            if (el) el.textContent = value;
        }

        function processSignal(data) {
            const { a: addr, v: val } = data;

            // Handle Mouse Position
            if (addr === "position/x") {
                mouseX = val;
                updateCursor(mouseX, mouseY);
                updateMonitorUI('position', `${Math.round(mouseX)}, ${Math.round(mouseY)}`);
            } else if (addr === "position/y") {
                mouseY = val;
                updateCursor(mouseX, mouseY);
                updateMonitorUI('position', `${Math.round(mouseX)}, ${Math.round(mouseY)}`);
            }

            // Handle Clicks
            if (addr.startsWith("click/")) {
                const button = addr.split("/")[1];
                let action = "";
                switch (button) {
                    case "left": action = "Left Click"; break;
                    case "right": action = "Right Click"; break;
                    case "middle": action = "Middle Click"; break;
                    default: action = button.toUpperCase().startsWith("X") ? button.toUpperCase() : `Button ${button}`;
                }

                addCombination({ mouse: { action: action } });
                updateMonitorUI('click', action);
            }

            // Handle Scroll
            if (addr === "scroll/v" || addr === "scroll/h") {
                let action = "";
                if (addr === "scroll/v") {
                    action = val > 0 ? "Scroll Up" : "Scroll Down";
                } else {
                    action = val > 0 ? "Scroll Left" : "Scroll Right";
                }

                updateMonitorUI('scroll', action);
                addCombination({ mouse: { action: action } });
            }

            if (addr === "scroll/speed") {
                updateScroll(val);
            }
        }

        function addCombination(event) {
            const container = document.createElement('div');
            container.className = 'combo-container';

            const mouseAction = event.mouse ? event.mouse.action : null;

            if (mouseAction) {
                const mouseEl = document.createElement('span');
                mouseEl.className = 'mouse-action';
                mouseEl.textContent = mouseAction;
                container.appendChild(mouseEl);
            }

            historyContainer.appendChild(container);

            if (historyContainer.children.length > 5) {
                historyContainer.removeChild(historyContainer.children[0]);
            }

            setTimeout(() => {
                container.style.animation = 'fadeOut 0.5s forwards';
                setTimeout(() => {
                    if (container.parentNode) container.remove();
                }, 500);
            }, 3000);
        }

        function updateCursor(x, y) {
            cursorGlow.style.opacity = '1';
            cursorGlow.style.left = `${(x / window.screen.width) * 100}vw`;
            cursorGlow.style.top = `${(y / window.screen.height) * 100}vh`;

            clearTimeout(window.cursorTimer);
            window.cursorTimer = setTimeout(() => {
                cursorGlow.style.opacity = '0';
            }, 1000);
        }

        function updateScroll(speed) {
            scrollLabel.style.opacity = '1';
            scrollLabel.textContent = `Scroll: ${speed.toFixed(2)}`;

            clearTimeout(clearScrollTimer);
            clearScrollTimer = setTimeout(() => {
                scrollLabel.style.opacity = '0';
            }, 500);
        }

        console.log('Mouse Monitor Overlay ready');
    </script>
</body>

</html>
