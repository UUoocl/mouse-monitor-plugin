# Plugin Information
Plugin.Name="Mouse Monitor"
Plugin.Description="Monitors mouse position, clicks, and scrolls, and emits events to browser sources."

# Settings Dialog
Settings.Title="Mouse Monitor Settings"
Settings.Description="Configure mouse monitoring and target browser sources"

# Target Browser Source Selection
Settings.Group.Targets="Target Browser Sources"
Settings.Label.ClickTarget="Mouse Clicks Target:"
Settings.Tooltip.ClickTarget="Select the browser source that will receive mouse click events (Left, Right, Middle, etc.)."
Settings.Label.ScrollTarget="Mouse Scroll Target:"
Settings.Tooltip.ScrollTarget="Select the browser source that will receive mouse scroll events (Up, Down, Left, Right)."
Settings.Label.PositionTarget="Mouse Position Target:"
Settings.Tooltip.PositionTarget="Select the browser source that will receive real-time mouse coordinates."

# Mouse Monitoring Settings
Settings.Group.Monitoring="Monitoring Options"
Settings.Checkbox.EnableClicks="Enable Click Monitoring"
Settings.Tooltip.EnableClicks="Monitor and send mouse click events."
Settings.Checkbox.EnableScroll="Enable Scroll Monitoring"
Settings.Tooltip.EnableScroll="Monitor and send scroll wheel events."
Settings.Checkbox.EnablePosition="Enable Position Monitoring"
Settings.Tooltip.EnablePosition="Monitor and send real-time mouse position coordinates (X, Y)."
Settings.Label.MouseFps="Position Update FPS:"
Settings.Tooltip.MouseFps="Frequency of mouse position updates in FPS. Higher values result in smoother tracking but more frequent events."
Settings.Checkbox.StartWithObs="Start Monitoring on OBS Startup"
Settings.Tooltip.StartWithObs="Automatically start mouse monitoring when OBS Studio launches."
Settings.Checkbox.EnableLogging="Enable Logging to OBS Log"
Settings.Tooltip.EnableLogging="Write mouse event details to the OBS log for debugging purposes."

# Dialog Buttons
Settings.Button.Apply="Apply"
Settings.Tooltip.Apply="Save and apply all settings changes."
Settings.Button.Close="Close"
Settings.Tooltip.Close="Close the settings dialog."

# Status Messages
Status.Hook.Enabled="Mouse monitoring hook enabled successfully."
Status.Hook.Disabled="Mouse monitoring hook disabled."

# Errors
Error.Accessibility.Permission="⚠️ Accessibility Permission Required"
Error.Accessibility.Instructions="macOS requires Accessibility permissions to monitor mouse inputs.\n\nPlease grant permissions in System Preferences."
